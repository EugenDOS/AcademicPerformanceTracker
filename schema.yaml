          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAttendanceRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    delete:
      operationId: attendance_destroy
      summary: Удалить запись посещаемости
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this посещаемость.
        required: true
      tags:
      - Посещаемость
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: No response body
