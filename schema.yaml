              $ref: '#/components/schemas/AttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    patch:
      operationId: attendance_partial_update
      summary: Частично обновить запись посещаемости
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this посещаемость.
        required: true
      tags:
      - Посещаемость
