openapi: 3.0.3
info:
  title: Academic Performance Tracker API
  version: 1.0.0
  description: API для учета успеваемости и посещаемости студентов.
paths:
  /api/attendance/:
    get:
      operationId: attendance_list
      summary: Список записей посещаемости
      tags:
      - Посещаемость
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attendance'
          description: ''
    post:
      operationId: attendance_create
      summary: Создать запись посещаемости
      tags:
      - Посещаемость
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
            examples:
              Пример:
                value:
                  lesson: 1
                  student: 3
                  status: present
                  comment: ''
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
  /api/attendance/{id}/:
    get:
      operationId: attendance_retrieve
      summary: Запись посещаемости по ID
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this посещаемость.
        required: true
      tags:
      - Посещаемость
      security:
      - jwtAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attendance'
          description: ''
    put:
      operationId: attendance_update
      summary: Обновить запись посещаемости
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this посещаемость.
        required: true
      tags:
      - Посещаемость
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceRequest'
          application/x-www-form-urlencoded:
