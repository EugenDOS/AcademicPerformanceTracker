{% extends "performance/base.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}
<h1>Профиль</h1>

<form class="login-box" method="post">
    {% csrf_token %}
    <p class="muted">Логин: {{ user.username }} · роль: {{ user.get_role_display }}</p>
    <p class="muted">Группа: {{ user.group|default:"-" }}</p>

    <label for="first_name">Имя</label>
    <input id="first_name" name="first_name" value="{{ user.first_name }}">

    <label for="last_name">Фамилия</label>
    <input id="last_name" name="last_name" value="{{ user.last_name }}">

    <label for="email">Email</label>
    <input id="email" name="email" type="email" value="{{ user.email }}">

    <button class="primary" type="submit">Сохранить</button>
</form>

<h2>Безопасность</h2>
<p><a href="{% url 'password-change' %}">Сменить пароль</a></p>
{% endblock %}
